server:
  port: 8081

spring:

  security:
    user:
      name: admin
      password: admin123


  datasource:
    url: jdbc:postgresql://localhost:5432/bank_db
    username: postgres
    password: ${PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect